job_id: RB-INT-CHASSIS-002
stage: S1
worker: worker_a
authority: baseline-vs-current exact status matrix
baseline_source: https://github.com/blackholecapital/gatweay-production-FREEZE
current_rebuild_source: /home/user/gateway-fullbody-freeze
status_values:
  - present          # baseline surface exists at the exact same path in current rebuild
  - rebuilt          # baseline surface exists at a different declared chassis-native path in current rebuild
  - missing          # baseline surface has no equivalent in current rebuild
classification_rule: >
  A baseline path is "present" only when the exact same relative path exists in current
  rebuild with equivalent intent. "Rebuilt" requires a declared one-to-one chassis-native
  counterpart. Anything else is "missing".

