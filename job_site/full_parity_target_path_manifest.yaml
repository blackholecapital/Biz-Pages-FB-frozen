html_entrypoint:

  - baseline_path: product-shell/index.html
    target_path: apps/product-shell/index.html
    action: create
    category: html_entrypoint
    deploy_critical: yes
    source_ref: https://github.com/blackholecapital/gatweay-production-FREEZE/blob/main/product-shell/index.html
    declared_contents_summary: >
      <!doctype html> with <html lang="en">, meta charset UTF-8, meta viewport,
      <title>Gateway</title>, favicon link to /drip.png (icon + apple-touch-icon),
      <body> containing <div id="root"></div> and
      <script type="module" src="/src/main.tsx"></script>.
    assigned_worker: worker_a_s3

