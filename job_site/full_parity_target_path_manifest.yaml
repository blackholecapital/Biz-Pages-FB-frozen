manifest_id: RB-INT-CHASSIS-002-S2-full-parity-target-path-manifest
job_id: RB-INT-CHASSIS-002
stage: S2
pass: partial — deploy app root only
worker: worker_a
authority: exact chassis-native target paths for missing deploy app root surfaces
source_matrix: /job_site/missing_surface_matrix.yaml
baseline_source: https://github.com/blackholecapital/gatweay-production-FREEZE
chassis_root: /home/user/gateway-fullbody-freeze
declared_deploy_root: apps/product-shell

extension:
  - stage: S3
    worker: worker_b
    pass: partial — modules/engage + modules/payme; mapping and allowlist only; no file creation
    sections_added: SECTION 7 — MODULE PACKAGES (modules/engage, modules/payme)
    modules_in_scope:
      - modules/engage
      - modules/payme
    modules_deferred:
      - modules/referrals # deferred to a later S3 worker_b sub-pass
      - modules/vault     # deferred to a later S3 worker_b sub-pass
    deploy_critical_filter: >
      Only baseline rows with deploy_critical: yes in
      /job_site/missing_surface_matrix.yaml §module_packages for modules/engage
      and modules/payme are mapped. Rows with deploy_critical: no are
      explicitly excluded. Other modules (referrals, vault) are not processed
      in this pass.
    chassis_native_mapping_rule_modules: >
      Baseline `modules/<name>/` maps to chassis-native `apps/modules/<name>/`
      for every module processed in this extension. For modules/engage this
      preserves the baseline relative reference `../modules/engage` declared
      in `apps/product-shell/package.json` build:engage script: `../modules/engage`
      relative to `apps/product-shell/` resolves to `apps/modules/engage/`
      under this mapping. The same mapping rule applies to modules/payme
      (`apps/modules/payme/`). Referrals and vault will be mapped under the
      identical rule when dispatched in later sub-passes.

scope_lock:
  included:
    - deploy_app_root/product-shell package.json
    - deploy_app_root/product-shell index.html
    - deploy_app_root/product-shell vite.config.ts
    - deploy_app_root/product-shell tsconfig.json
    - deploy_app_root/product-shell tsconfig.node.json
    - deploy_app_root/product-shell src/main.tsx
    - deploy_app_root/product-shell src/app/
    - deploy_app_root/product-shell public/_redirects
    - deploy_app_root/product-shell functions/api/
    - deploy_app_root/product-shell functions/_lib/
  included_module_extension:
    - apps/modules/engage package.json
    - apps/modules/engage package-lock.json
    - apps/modules/engage vite.config.js
    - apps/modules/engage index.html
    - apps/modules/engage src/main.jsx
    - apps/modules/engage src/App.jsx
    - apps/modules/engage src/ (full tree)
    - apps/modules/engage public/_redirects
    - apps/modules/payme package.json
    - apps/modules/payme vite.config.js
    - apps/modules/payme index.html
    - apps/modules/payme src/ (full tree)
  excluded:
    - modules/referrals/ (deferred to later S3 worker_b sub-pass)
    - modules/vault/     (deferred to later S3 worker_b sub-pass)
    - engagefi-admin-minimal/, payme-admin-minimal/, referral-admin-minimal/ (deferred)
    - src/components/, src/features/, src/pages/, src/hooks/, src/integrations/, src/runtime/, src/state/, src/styles/, src/utils/, src/config/, src/contracts/, src/mobile/ (deferred)
    - public/ads/, public/apps/, public/demo/, public/wallpapers/, drip.png (deferred)
    - tests/ (deferred)
    - production/, resolver-boundary/, variation-control/, _review-required/ (deferred)
    - docs/, blueprint/, README.md (deferred)

chassis_native_mapping_rule: >
  Baseline root directory `product-shell/` maps to chassis-native deploy root
  `apps/product-shell/`. All baseline-relative paths under `product-shell/` are
  preserved one-for-one beneath `apps/product-shell/`. This preserves baseline
  internal relative path semantics while placing the deployable app under the
  chassis `apps/` root convention already used by apps/core-runtime,
  apps/operator-shell, apps/web-public, and apps/local-host.

# =============================================================================
# SECTION 1 — PACKAGE MANIFEST
# =============================================================================
package_manifest:

  - baseline_path: product-shell/package.json
    target_path: apps/product-shell/package.json
    action: create
    category: package_manifest
    deploy_critical: yes
    source_ref: https://github.com/blackholecapital/gatweay-production-FREEZE/blob/main/product-shell/package.json
    declared_contents:
      name: gateway-demo-zero
      private: true
      version: 0.0.0
      type: module
      scripts:
        dev: vite
        build: "npm run build:engage && vite build"
        preview: vite preview
        build:engage: "npm --prefix ../modules/engage install --progress=false && npm --prefix ../modules/engage run build"
        test: "node --test tests/microfrontend/*.test.mjs"
        test:pass5: "npm run test"
        typecheck: "tsc --noEmit"
      dependencies:
        react: ^18.3.1
        react-dom: ^18.3.1
        react-router-dom: ^6.26.2
      devDependencies:
        "@types/react": ^18.3.3
        "@types/react-dom": ^18.3.0
        "@vitejs/plugin-react": ^4.3.1
        typescript: ^5.5.4
        vite: ^5.4.2
    assigned_worker: worker_a_s3

# =============================================================================
# SECTION 2 — HTML ENTRYPOINT
# =============================================================================
html_entrypoint:

  - baseline_path: product-shell/index.html
    target_path: apps/product-shell/index.html
    action: create
    category: html_entrypoint
    deploy_critical: yes
    source_ref: https://github.com/blackholecapital/gatweay-production-FREEZE/blob/main/product-shell/index.html
    declared_contents_summary: >
      <!doctype html> with <html lang="en">, meta charset UTF-8, meta viewport,
      <title>Gateway</title>, favicon link to /drip.png (icon + apple-touch-icon),
      <body> containing <div id="root"></div> and
      <script type="module" src="/src/main.tsx"></script>.
    assigned_worker: worker_a_s3

# =============================================================================
# SECTION 3 — BUILD CONFIGS
# =============================================================================
build_configs:

  - baseline_path: product-shell/vite.config.ts
    target_path: apps/product-shell/vite.config.ts
    action: create
    category: build_config
    deploy_critical: yes
    source_ref: https://github.com/blackholecapital/gatweay-production-FREEZE/blob/main/product-shell/vite.config.ts
    declared_contents_summary: >
      import { defineConfig } from "vite";
      import react from "@vitejs/plugin-react";
      export default defineConfig({ plugins: [react()], server: { port: 5173 } });
    assigned_worker: worker_a_s3

  - baseline_path: product-shell/tsconfig.json
    target_path: apps/product-shell/tsconfig.json
    action: create
    category: build_config
    deploy_critical: yes
    source_ref: https://github.com/blackholecapital/gatweay-production-FREEZE/blob/main/product-shell/tsconfig.json
    declared_contents_summary: >
      compilerOptions: target ES2022, useDefineForClassFields true,
      lib ["ES2022","DOM","DOM.Iterable"], module ESNext, skipLibCheck true,
      moduleResolution "Bundler", resolveJsonModule true, isolatedModules true,
      noEmit true, jsx "react-jsx", strict true, types ["vite/client"];
