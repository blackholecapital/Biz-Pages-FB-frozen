chassis_native_mapping_rule: >
  Baseline root directory `product-shell/` maps to chassis-native deploy root
  `apps/product-shell/`. All baseline-relative paths under `product-shell/` are
  preserved one-for-one beneath `apps/product-shell/`. This preserves baseline
  internal relative path semantics while placing the deployable app under the
  chassis `apps/` root convention already used by apps/core-runtime,
  apps/operator-shell, apps/web-public, and apps/local-host.

# =============================================================================
# SECTION 1 — PACKAGE MANIFEST
# =============================================================================
package_manifest:

  - baseline_path: product-shell/package.json
    target_path: apps/product-shell/package.json
    action: create
    category: package_manifest
    deploy_critical: yes
    source_ref: https://github.com/blackholecapital/gatweay-production-FREEZE/blob/main/product-shell/package.json
    declared_contents:
      name: gateway-demo-zero
      private: true
      version: 0.0.0
      type: module
      scripts:
        dev: vite
        build: "npm run build:engage && vite build"
        preview: vite preview
        build:engage: "npm --prefix ../modules/engage install --progress=false && npm --prefix ../modules/engage run build"
        test: "node --test tests/microfrontend/*.test.mjs"
        test:pass5: "npm run test"
        typecheck: "tsc --noEmit"
      dependencies:
        react: ^18.3.1
        react-dom: ^18.3.1
        react-router-dom: ^6.26.2
      devDependencies:
        "@types/react": ^18.3.3
        "@types/react-dom": ^18.3.0
        "@vitejs/plugin-react": ^4.3.1
        typescript: ^5.5.4
        vite: ^5.4.2
    assigned_worker: worker_a_s3

# =============================================================================
