# SECTION 6 — TRANSPORT LINKS
# packages: packages/session-transport/ (new), packages/runtime-bridge/
# apps: apps/local-host/src/bridge/
# ─────────────────────────────────────────────────────────────────────────────
transport_links:

  # ── New package: packages/session-transport/ ────────────────────────────────

  - path: packages/session-transport/src/transport.contract.ts
    action: create
    category: transport_links
    package_status: new_package
    change_summary: >
      Declare SessionTransportState interface:
        readonly bridge_ready: boolean
        readonly activation_eligible: boolean
        readonly admin_panels_registered: boolean
      Declare SessionTransportConfig interface:
        readonly session_id: string
        readonly transport_state: SessionTransportState
      Downstream status: non-authoritative — consumes declared contracts only.
      No resolver authority. No install path override.
    assigned_worker: worker_a_s3

  - path: packages/session-transport/src/session-transport-link.ts
    action: create
    category: transport_links
    package_status: new_package
    change_summary: >
      Import SessionTransportConfig from ./transport.contract.js.
      Export isTransportReady(config: SessionTransportConfig): boolean —
      returns config.transport_state.bridge_ready
             && config.transport_state.activation_eligible
             && config.transport_state.admin_panels_registered.
      NOTE: this function is NOT a gate in INSTALL_CHAIN_GATES and must
      not be added to the install chain gate sequence.
      Downstream status: non-authoritative — transport only.
    assigned_worker: worker_a_s3

  - path: packages/session-transport/src/index.ts
    action: create
    category: transport_links
    package_status: new_package
    change_summary: >
      Barrel export:
        SessionTransportState, SessionTransportConfig from ./transport.contract.js
        isTransportReady from ./session-transport-link.js
      Downstream status: non-authoritative.
    assigned_worker: worker_a_s3

  # ── Existing package: packages/runtime-bridge/ ───────────────────────────

  - path: packages/runtime-bridge/src/admin-bridge-contract.ts
    action: create
    category: transport_links
    change_summary: >
      Import InstallStamp from ../../contracts-core/src/chassis/install-stamp.contract.js.
      Import STAMP_STATES from ../../contracts-core/src/chassis/domain.js.
      Export AdminBridgeState interface:
        readonly install_stamp: InstallStamp
        readonly payme_admin_registered: boolean
        readonly referral_admin_registered: boolean
      Export isAdminBridgeActivatable(state: AdminBridgeState): boolean —
      returns state.install_stamp.stamp_state === STAMP_STATES.ISSUED
             && state.payme_admin_registered
             && state.referral_admin_registered.
      Downstream status: non-authoritative — pass-through only; no resolver authority.
    assigned_worker: worker_a_s3

  - path: packages/runtime-bridge/src/index.ts
    action: extend
    category: transport_links
    change_summary: >
      Add exports: AdminBridgeState, isAdminBridgeActivatable from ./admin-bridge-contract.js
    assigned_worker: worker_a_s3

  # ── Existing app: apps/local-host/src/bridge/ ────────────────────────────

  - path: apps/local-host/src/bridge/admin-bridge.ts
    action: create
    category: transport_links
    change_summary: >
      Import InstallStamp from ../../../../packages/contracts-core/src/chassis/install-stamp.contract.js.
      Import STAMP_STATES from ../../../../packages/contracts-core/src/chassis/domain.js.
      Export AdminBridgeConfig interface:
        readonly install_stamp: InstallStamp
        readonly production_install_verified: boolean
        readonly payme_admin_mount_ready: boolean
        readonly referral_admin_mount_ready: boolean
      Export isAdminBridgeReady(config: AdminBridgeConfig): boolean —
      returns config.install_stamp.stamp_state === STAMP_STATES.ISSUED
             && config.production_install_verified
             && config.payme_admin_mount_ready
             && config.referral_admin_mount_ready.
      Downstream status: non-authoritative — bridge only; no resolver authority.
    assigned_worker: worker_a_s3

  - path: apps/local-host/src/bridge/index.ts
    action: extend
    category: transport_links
    change_summary: >
      Add exports: AdminBridgeConfig, isAdminBridgeReady from ./admin-bridge.js
    assigned_worker: worker_a_s3

  # Existing transport files unchanged:
  # apps/local-host/src/bridge/runtime-bridge.ts    — NO CHANGE
  # apps/local-host/src/transport/session-link.ts   — NO CHANGE
  # apps/local-host/src/transport/index.ts          — NO CHANGE

