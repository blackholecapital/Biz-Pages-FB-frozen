runtime_contracts:

  - path: packages/contracts-core/src/chassis/domain.ts
    action: extend
    category: runtime_contracts
    change_summary: >
      Append new ID sets: MODULE_IDS (payme.admin, referral.admin),
      ROUTE_IDS (payme.admin, referral.admin),
      TOUCHPOINT_IDS (cli.payme.admin, cli.referral.admin, api.payme.admin, api.referral.admin),
      TRIGGER_IDS (payme.admin, referral.admin),
      EVENT_IDS (6 events: payme.admin.{requested,completed,failed},
      referral.admin.{requested,completed,failed}).
      No removals. No SURFACE_IDS or SHELL_OWNER_IDS additions.
    assigned_worker: worker_a_s3

  - path: packages/contracts-core/src/profiles/compatibility-map.ts
    action: extend
    category: runtime_contracts
    change_summary: >
      Extend FULL_BODY_PROFILE allowed buckets: add ROUTE_IDS.PAYME_ADMIN and
      ROUTE_IDS.REFERRAL_ADMIN to routes.allowed; add all 4 new TOUCHPOINT_IDS
      to touchpoints.allowed and mounts.allowed.
      MOBILE_OPTIMIZED_PROFILE and PC_OPTIMIZED_PROFILE unchanged (empty, unresolved).
    assigned_worker: worker_a_s3

  # Contract shape files — no change required
  # packages/contracts-core/src/chassis/module.contract.ts        — NO CHANGE
  # packages/contracts-core/src/chassis/route.contract.ts         — NO CHANGE
  # packages/contracts-core/src/chassis/touchpoint.contract.ts    — NO CHANGE
