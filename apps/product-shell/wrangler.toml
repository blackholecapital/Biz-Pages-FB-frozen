# Cloudflare Pages — apps/product-shell
#
# job_id:        BIZ-PAGES-PROD-DETANGLE-002
# stage / pass:  S5 / Worker A
# artifact id:   /job_site/repo_mirror/Biz-Pages-FB-frozen-main/apps/product-shell/wrangler.toml
# binding map:   /job_site/cloudflare_binding_map.md
# runbook:       /job_site/cloudflare_rebuild_runbook.md
# cutover spec:  /job_site/deploy_cutover_spec.md  (Target A — Pages-first)
# runtime notes: /job_site/cloudflare_runtime_notes.md  (§2, §4)
#
# Purpose
# -------
# Externalize the Cloudflare Pages project configuration for the Biz Pages
# product-shell so the deploy is reproducible from this repo and no longer
# depends on hidden / drifted Pages dashboard metadata (build-sheet §1.3,
# operator belief B1/B5).
#
# This file declares the Pages-compatible wrangler config:
#   - project identity (`name`)
#   - build output directory (`pages_build_output_dir`)
#   - compatibility date / flags for Pages Functions runtime
#   - R2 bindings consumed by the Pages Functions in
#     apps/product-shell/functions/api/* (TENANTS_BUCKET, DEMO_BUCKET)
#   - one plain-text env var (ASSET_BASE_URL) consumed by
#     apps/product-shell/functions/_lib/runtime-r2.js
#
# Bucket names below are placeholders the operator MUST replace with the
# actual R2 bucket names recorded in /job_site/cloudflare_binding_map.md §2.
# Binding NAMES are NOT placeholders — they are pinned to the names the
# Pages Functions read at runtime and must not be renamed without updating
# every cited file in /job_site/cloudflare_binding_map.md §3.
#
# Cutover note (deploy_cutover_spec.md §2)
# ----------------------------------------
# This file is the Target A (Pages-first) artifact. If the operator selects
# Target B (Worker-first) at S5 cutover time, a second wrangler.toml will
# live under apps/product-shell/worker/wrangler.toml declaring the Worker
# routes plus its own bindings; this Pages wrangler.toml then degrades to
# static-only (R2 bindings can be removed at that point because the Worker
# owns /api/*). See cloudflare_binding_map.md §3 for the Worker-first
# binding block.

name = "biz-pages"
pages_build_output_dir = "./dist"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# -----------------------------------------------------------------------------
# R2 bindings — consumed by Pages Functions
# -----------------------------------------------------------------------------
# TENANTS_BUCKET — required.
#   Read by:
#     functions/api/published-page.js     (lines 13, 47, 64)
#     functions/api/published-manifest.js (lines 13, 45)
#     functions/api/page.js               (lines 66, 76, 86)
#   Key shapes: tenants/<slug>/<page>.json, <slug>.json
#   Replace `bucket_name` with the actual R2 bucket per
#   /job_site/cloudflare_binding_map.md §2 row TENANTS_BUCKET.
[[r2_buckets]]
binding    = "TENANTS_BUCKET"
bucket_name = "REPLACE_WITH_TENANTS_BUCKET_NAME"

# DEMO_BUCKET — optional at code level (handlers guard with
# `if (env?.DEMO_BUCKET)`), but DECLARED here so the binding is reproducible
# and the Pages project does not depend on dashboard-only state.
#   Read by:
#     functions/api/published-page.js     (lines 26, 27)
#     functions/api/published-manifest.js (lines 23, 25)
#   Key shape: json/<slug>/site.json (Studio/demo bundle)
#   Replace `bucket_name` with the actual R2 bucket per
#   /job_site/cloudflare_binding_map.md §2 row DEMO_BUCKET. If the
#   operator decides at cutover time that no demo bucket should be wired
#   to the production Pages project, delete this whole [[r2_buckets]]
#   block — handlers will then take the "no demo bundle" branch.
[[r2_buckets]]
binding    = "DEMO_BUCKET"
bucket_name = "REPLACE_WITH_DEMO_BUCKET_NAME"

# -----------------------------------------------------------------------------
# Plain-text vars — non-secret, build-time / runtime knobs
# -----------------------------------------------------------------------------
# ASSET_BASE_URL — optional.
#   Read by: functions/_lib/runtime-r2.js → getAssetBaseUrl(env)
#   Behaviour:
#     ""        → asset URLs are composed as `/assets/<folder>/<code>.<ext>`
#                 (served by Pages; the deploy-side route must rewrite to R2)
#     "https://assets.example/" → asset URLs are composed as
#                 `<host>/<folder>/<code>.<ext>` (worker- or R2-custom-domain
#                 fronted)
#   Operator sets the production value per
#   /job_site/cloudflare_binding_map.md §3 row ASSET_BASE_URL.
[vars]
ASSET_BASE_URL = ""

# -----------------------------------------------------------------------------
# Per-environment overrides
# -----------------------------------------------------------------------------
# Pages exposes two implicit environments: production (prod branch) and
# preview (every other branch). Both inherit the top-level bindings above.
# Per-env override blocks are kept minimal so the production binding map
# lives in one place. Override here only when operator confirms
# environment-specific buckets in /job_site/cloudflare_binding_map.md §2.

[env.production]
# inherits top-level r2_buckets and vars; override only on operator dispatch.

[env.preview]
# inherits top-level r2_buckets and vars; override only on operator dispatch.
